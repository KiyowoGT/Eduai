version: "3.9"

# ── EduAI local dev stack ─────────────────────────────────────────────────────
# Kafka in KRaft mode (no Zookeeper needed)
# Usage:
#   docker compose up -d          → start Kafka + UI
#   docker compose down -v        → stop & wipe volumes
#   docker compose logs -f kafka  → tail broker logs

services:
  # ── Kafka Broker (KRaft, single-node) ────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.9
    container_name: eduai-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"       # app / local connections
      - "9094:9094"       # external (host machine)
    environment:
      # KRaft mode — no Zookeeper
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # Listeners
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Topic defaults
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 168   # 7 days

      # Performance / safety
      KAFKA_CFG_LOG_FLUSH_INTERVAL_MESSAGES: 10000
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Kafka UI (Provectus) — http://localhost:8090 ──────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: eduai-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: eduai-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "false"
      DYNAMIC_CONFIG_ENABLED: "true"

  # ── Topic initialiser (one-shot) ───────────────────────────────────────────────
  kafka-init:
    image: bitnami/kafka:3.9
    container_name: eduai-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating EduAI Kafka topics…'
      for topic in eduai.document.analyze eduai.quiz.generate eduai.quiz.grade eduai.recap.generate eduai.music.generate eduai.chat.respond eduai.quiz.grade.student eduai.quiz.auto-publish eduai.storage.upload eduai.tasks.cleanup eduai.dlq; do
        kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic $$topic \
          --partitions 3 \
          --replication-factor 1
        echo \"  ✓ $$topic\"
      done
      echo 'Done.'
      "
    restart: "no"

volumes:
  kafka_data:
    driver: local
